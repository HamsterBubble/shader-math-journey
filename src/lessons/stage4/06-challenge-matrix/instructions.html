<h3>💡 提示</h3>
<ul>
  <li>万花筒的核心：<code>旋转 → abs() → 旋转 → abs()</code> 重复多次</li>
  <li>每次 <code>abs(uv)</code> 相当于沿轴做镜像折叠</li>
  <li>旋转角度 = <code>π / N</code>，N 是对称轴数量</li>
  <li>折叠后的坐标空间很小，在里面画简单图案会被对称展开</li>
</ul>
