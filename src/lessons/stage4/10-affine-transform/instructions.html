<h2>📐 仿射变换与 mat3</h2>
<h3>mat2 不能平移</h3>
<p>mat2 只做线性变换（旋转/缩放/剪切）。平移需要<strong>齐次坐标</strong>：把 (x,y) 升维为 (x,y,1)，用 mat3 同时编码旋转+缩放+平移。</p>
<div class="formula-block">
  mat3 = [旋转/缩放 2×2 | 平移 2×1]<br>
  　　　 [    0   0     |    1    ]
</div>
<h3>这就是 3D 图形的核心</h3>
<div class="info-box">
  3D 渲染用 mat4 做同样的事：3D 旋转/缩放 + 平移。<br>
  理解了 2D 的 mat3，就理解了 3D 的 mat4 模型矩阵。
</div>

  <h4>🎯 动手试试</h4>
