<h2>🌊 sin() — 波浪函数</h2>
<h3>sin 的核心性质</h3>
<p><code>sin(x)</code> 输出在 <strong>-1 ~ 1</strong> 之间来回振荡，周期为 <strong>2π (≈6.28)</strong>。</p>
<ul>
  <li><strong>振幅</strong>控制高度：<code>A * sin(x)</code></li>
  <li><strong>频率</strong>控制密度：<code>sin(F * x)</code></li>
  <li><strong>相位</strong>控制偏移：<code>sin(x + P)</code></li>
</ul>
<div class="info-box">
  <strong>通用公式：</strong><code>y = A * sin(F * x + P)</code><br>
  Shader 中几乎所有动画都基于这个公式。
</div>
