<h2>⭕ sin + cos = 圆形运动</h2>
<h3>单位圆</h3>
<p><code>cos(t)</code> 和 <code>sin(t)</code> 本质是单位圆上点的 x, y 坐标。</p>
<p>所以 <code>vec2(cos(t), sin(t))</code> 就是一个<strong>圆形轨迹</strong>！</p>
<div class="info-box tip">
  <strong>💡 黄金公式：</strong><br>
  <code>x = r * cos(angle)</code><br>
  <code>y = r * sin(angle)</code><br>
  这个公式在 Shader 中无处不在！
</div>
