<h2>🪞 反射向量</h2>
<p>反射是光照计算的核心：</p>
<p style="text-align:center;color:var(--accent);">
  R = I - 2 × dot(I, N) × N
</p>
<ul>
  <li><strong>I</strong> = 入射方向（指向表面）</li>
  <li><strong>N</strong> = 法线（表面朝外）</li>
  <li><strong>R</strong> = 反射方向（弹出去）</li>
</ul>
<p>GLSL 内置了 <code>reflect(I, N)</code>，但理解数学很重要！</p>
<h3>应用</h3>
<ul>
  <li><strong>镜面高光</strong>: 反射光接近视线方向 → 亮</li>
  <li><strong>环境映射</strong>: 用反射方向查找环境贴图</li>
  <li><strong>光线追踪</strong>: 射线命中后反射继续追踪</li>
</ul>
