<h2>➕ 向量加减法</h2>
<p>向量加减法是<strong>逐分量</strong>的：</p>
<ul>
  <li><code>vec2(1,2) + vec2(3,4) = vec2(4,6)</code></li>
  <li>加法 → 位移/偏移</li>
  <li>减法 → 求两点间的向量</li>
</ul>
<div class="info-box">
  <code>uv - center</code> 就是从 center 到 uv 的向量，用它可以求距离和方向。
</div>
