<h2>🌊 FBM — 分形布朗运动</h2>
<p>单层噪声太单调。FBM 叠加多层不同频率的噪声：</p>
<ul>
  <li>每层频率 ×2（更细）</li>
  <li>每层振幅 ×0.5（更弱）</li>
  <li>叠加 4-6 层</li>
</ul>
<p>结果像<strong>云朵、地形、烟雾</strong>。</p>
<div class="task-box">
  <h4>🎯 动手试试</h4>
  <p>1. 改层数（3 层 vs 8 层）</p>
  <p>2. 改频率倍数（不一定是 2.0）</p>
  <p>3. 用 FBM 值做颜色映射（地形色阶）</p>
</div>
