<h3>💡 提示</h3>
<ul>
  <li>火焰 = 向上运动的噪声（uv.y 加 u_time）</li>
  <li>火焰形状：越往上越窄，用 <code>abs(uv.x) * (1.0 + uv.y)</code> 收窄</li>
  <li>颜色映射：黑→红→橙→黄→白</li>
  <li>叠加 2-3 层噪声（类似 FBM，但只需 2 层）</li>
</ul>
