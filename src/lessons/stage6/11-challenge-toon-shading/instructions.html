<h3>Cel Shading 原理</h3>
<div class="formula-block">toonLight = floor(diffuse × bands) / bands</div>
<ul><li>bands=2 → 明暗两色（漫画风）</li><li>bands=3 → 暗/中/亮 三阶（动画风）</li><li>描边 = SDF 边缘加黑线</li></ul>
