<h3>💡 提示</h3>
<ul>
  <li><code>fract(uv * N)</code> 创建 N×N 网格</li>
  <li><code>floor(uv * N)</code> 获得每个格子的 ID</li>
  <li>用 cellID 计算不同的动画相位</li>
  <li>环 = <code>abs(距离 - 半径) < 厚度</code></li>
  <li>中心加一个小圆点增加层次感</li>
</ul>
