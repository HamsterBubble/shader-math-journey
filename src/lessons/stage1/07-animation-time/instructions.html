<h2>⏱️ u_time — 让一切动起来</h2>
<p><code>u_time</code> 是不断增长的秒数。配合 sin() 做动画：</p>
<ul>
  <li><code>sin(u_time)</code> → -1~1 往复</li>
  <li><code>sin(u_time)*0.5+0.5</code> → 映射到 0~1</li>
  <li><code>sin(u_time * 2.0)</code> → 2 倍速</li>
</ul>
<div class="info-box tip">
  <strong>💡</strong> <code>sin(x)*0.5+0.5</code> 是 Shader 中最常用的映射技巧！
</div>
