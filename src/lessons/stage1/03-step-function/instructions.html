<h2>🔲 step() — 阶跃函数</h2>
<p><code>step(edge, x)</code>：</p>
<ul>
  <li><code>x &lt; edge</code> → <strong>0.0</strong></li>
  <li><code>x >= edge</code> → <strong>1.0</strong></li>
</ul>
<p>像一个<strong>开关</strong>。Shader 中用它代替 if/else。</p>
<div class="info-box">
  GPU 上所有核心走相同代码路径，<code>step()</code>用纯数学实现分支，效率更高！
</div>
