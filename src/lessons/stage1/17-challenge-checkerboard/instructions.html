<h3>棋盘的数学</h3>
<div class="formula-block">
  checker = mod(floor(x × N) + floor(y × N), 2.0)
</div>
<p>当两个坐标的整数部分之和为偶数 → 白格；奇数 → 黑格。就这么简单。</p>

<h3>💡 提示</h3>
<ul>
  <li>使用 <code>mod(..., 2.0)</code> 得到 0 或 1</li>
  <li>用 mix 选择两种颜色</li>
  <li>加分：用 fract 得到格子内坐标，画出边框或圆角</li>
</ul>
