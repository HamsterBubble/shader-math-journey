<h2>〰️ smoothstep() — S 曲线过渡</h2>
<p><code>smoothstep(a, b, x)</code>：在 a~b 之间平滑过渡（S 曲线）。</p>
<ul>
  <li><code>x &lt; a</code> → 0</li>
  <li><code>x &gt; b</code> → 1</li>
  <li>a~b 之间 → 平滑插值</li>
</ul>
<div class="info-box tip">
  <strong>💡</strong> a, b 越接近 → 越尖锐（像 step）；差距越大 → 越柔和。
</div>
