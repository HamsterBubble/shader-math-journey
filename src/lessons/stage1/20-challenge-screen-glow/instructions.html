<p class="knowledge-tags"><a class="knowledge-link" data-page="/learn-aspect-ratio.html" data-title="宽高比校正"><span class="kl-icon">📏</span><span class="kl-text">为什么乘宽高比</span></a><a class="knowledge-link" data-page="/learn-uv-normalize.html" data-title="UV 归一化：像素 → [0, 1]"><span class="kl-icon">📍</span><span class="kl-text">为什么除以分辨率</span></a><a class="knowledge-link" data-page="/learn-uv-remap.html" data-title="坐标居中：uv × 2 − 1"><span class="kl-icon">📐</span><span class="kl-text">坐标居中原理</span></a><a class="knowledge-link" data-page="/learn-mix-blend.html" data-title="mix 颜色混合与插值"><span class="kl-icon">🎨</span><span class="kl-text">mix 混合原理</span></a><a class="knowledge-link" data-page="/learn-color-blend.html" data-title="颜色加减与光效叠加 (+= / *=)"><span class="kl-icon">✨</span><span class="kl-text">光斑与色彩算术</span></a></p>






<p>用多个移动光源叠加出霓虹海报式的亮部混合。普通 <code>mix</code> 会压暗光色，Screen 滤色会让光晕越叠越亮。</p>

<h3>要求</h3>
<ul>
  <li>实现 <code>screenBlend(a, b)</code></li>
  <li>至少绘制 3 个不同颜色的径向光晕</li>
  <li>使用 Screen 叠加光晕与深色背景</li>
  <li>让其中一个光晕随 <code>u_time</code> 移动</li>
</ul>
