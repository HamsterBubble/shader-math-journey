<h2>🏆 挑战：光晕滤色</h2>
<p class="knowledge-tags"><a class="knowledge-link" data-page="/learn-blend-screen.html" data-title="Screen 滤色混合"><span class="kl-icon">💡</span><span class="kl-text">Screen 滤色混合</span></a></p>

<p>用多个移动光源叠加出霓虹海报式的亮部混合。普通 <code>mix</code> 会压暗光色，Screen 滤色会让光晕越叠越亮。</p>

<div class="goal-preview"><div class="goal-label"><span class="dot"></span>目标效果</div><canvas class="goal-canvas"></canvas></div>

<h3>要求</h3>
<ul>
  <li>实现 <code>screenBlend(a, b)</code></li>
  <li>至少绘制 3 个不同颜色的径向光晕</li>
  <li>使用 Screen 叠加光晕与深色背景</li>
  <li>让其中一个光晕随 <code>u_time</code> 移动</li>
</ul>
