<h2>🌈 mix() — 线性插值</h2>
<h3>公式</h3>
<p><code>mix(a, b, t) = a × (1-t) + b × t</code></p>
<ul>
  <li><code>t = 0.0</code> → 返回 a</li>
  <li><code>t = 0.5</code> → 返回两者中间值</li>
  <li><code>t = 1.0</code> → 返回 b</li>
</ul>
<p>用 <code>uv.x</code> 作为 t，颜色从左到右平滑过渡。</p>
